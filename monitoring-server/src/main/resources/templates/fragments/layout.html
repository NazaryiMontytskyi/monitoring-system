<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Monitoring System'">Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:  '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="font-sans flex min-h-screen" style="background-color:#0f172a;color:#f1f5f9;">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-60 flex flex-col z-10 border-r"
           style="background-color:#0f172a;border-color:#334155;">
        <div class="p-5 border-b" style="border-color:#334155;">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color:#3b82f6;">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                </div>
                <span class="font-semibold text-sm" style="color:#f1f5f9;">Monitoring</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a th:href="@{/}"
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
               th:classappend="${currentPath == '/'} ? ' nav-link-active' : ''">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                Dashboard
            </a>
            <a th:href="@{/alerts}"
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
               th:classappend="${currentPath != null and currentPath.startsWith('/alerts')} ? ' nav-link-active' : ''">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                Alerts
            </a>
            <a th:href="@{/settings}"
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
               th:classappend="${currentPath == '/settings'} ? ' nav-link-active' : ''">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Settings
            </a>
        </nav>
        <div class="p-4 border-t" style="border-color:#334155;">
            <p class="text-xs" style="color:#475569;">Monitoring System • Phase 9</p>
        </div>
    </aside>

    <!-- Main area -->
    <div class="ml-60 flex-1 min-h-screen flex flex-col">
        <!-- Toast -->
        <div th:if="${successMessage != null}"
             x-data="{ show: true }"
             x-init="setTimeout(() => show = false, 3000)"
             x-show="show"
             class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium"
             style="background-color:#16a34a;color:#fff;">
            <span th:text="${successMessage}">Success</span>
        </div>

        <!-- Page content injected here -->
        <main th:replace="${content}">Content</main>
    </div>

    <script th:src="@{/js/charts.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>

    <!-- Chart Detail Modal -->
    <div id="chart-modal">
        <div id="chart-modal-inner">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0;">
                <span id="chart-modal-title" style="font-size:16px;font-weight:600;color:#f1f5f9;"></span>
                <button id="chart-modal-close"
                        style="background:none;border:none;color:#94a3b8;font-size:26px;line-height:1;cursor:pointer;padding:2px 8px;"
                        title="Close">&times;</button>
            </div>
            <div style="flex:1;min-height:0;position:relative;">
                <canvas id="chart-modal-canvas"></canvas>
            </div>
            <div id="chart-modal-pan-controls"
                 style="display:none;justify-content:center;gap:12px;margin-top:12px;flex-shrink:0;">
                <button id="chart-pan-left"
                        style="padding:6px 18px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:13px;">&#8592; Pan</button>
                <button id="chart-pan-right"
                        style="padding:6px 18px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:13px;">Pan &#8594;</button>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        var _modalChart      = null;
        var _modalAllLabels  = [];
        var _modalPanOffset  = 0;
        var _PAN_WINDOW      = 20;
        var _PAN_STEP        = 10;

        function openChartModal(sourceChart, title) {
            document.getElementById('chart-modal-title').textContent = title || '';

            var modal = document.getElementById('chart-modal');
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';

            var modalCanvas = document.getElementById('chart-modal-canvas');
            if (_modalChart) { _modalChart.destroy(); _modalChart = null; }

            var dataCopy   = JSON.parse(JSON.stringify(sourceChart.config.data));
            _modalAllLabels = dataCopy.labels || [];

            var sourceType = sourceChart.config.type;
            var isLine     = sourceType === 'line';

            if (isLine) {
                dataCopy.datasets.forEach(function (ds, idx) {
                    var orig = sourceChart.config.data.datasets[idx];
                    if (Array.isArray(orig.pointRadius)) {
                        ds.pointRadius      = orig.pointRadius.map(function (r) { return r >= 5 ? 8 : 3; });
                        ds.pointHoverRadius = orig.pointRadius.map(function (r) { return r >= 5 ? 10 : 5; });
                        if (orig.pointBackgroundColor) ds.pointBackgroundColor = orig.pointBackgroundColor.slice();
                        if (orig.pointBorderColor)     ds.pointBorderColor     = orig.pointBorderColor.slice();
                    } else {
                        ds.pointRadius      = 3;
                        ds.pointHoverRadius = 5;
                    }
                });
            }

            var gridColor = 'rgba(255,255,255,0.05)';
            var opts = {
                responsive:          true,
                maintainAspectRatio: false,
                animation:           false,
                plugins: {
                    legend:  { display: true, labels: { color: '#94a3b8', boxWidth: 12, font: { size: 13 } } },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { ticks: { color: '#94a3b8', font: { size: 11 }, maxTicksLimit: 20 }, grid: { color: gridColor } },
                    y: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: gridColor }, beginAtZero: true }
                }
            };

            var srcScales = sourceChart.options.scales;
            if (srcScales) {
                if (srcScales.x && srcScales.x.stacked) { opts.scales.x.stacked = true; opts.scales.y.stacked = true; }
                if (srcScales.y && srcScales.y.ticks && srcScales.y.ticks.stepSize) {
                    opts.scales.y.ticks.stepSize = srcScales.y.ticks.stepSize;
                }
            }

            var srcTooltip = sourceChart.options.plugins && sourceChart.options.plugins.tooltip;
            if (srcTooltip && srcTooltip.callbacks) {
                opts.plugins.tooltip.callbacks = srcTooltip.callbacks;
            }

            var panControls = document.getElementById('chart-modal-pan-controls');
            if (isLine && _modalAllLabels.length > _PAN_WINDOW) {
                _modalPanOffset = Math.max(0, _modalAllLabels.length - _PAN_WINDOW);
                opts.scales.x.min = _modalAllLabels[_modalPanOffset];
                opts.scales.x.max = _modalAllLabels[_modalPanOffset + _PAN_WINDOW - 1];
                if (panControls) panControls.style.display = 'flex';
            } else {
                _modalPanOffset = 0;
                if (panControls) panControls.style.display = 'none';
            }

            _modalChart = new Chart(modalCanvas, { type: sourceType, data: dataCopy, options: opts });
        }

        function closeChartModal() {
            var modal = document.getElementById('chart-modal');
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        function panModal(delta) {
            if (!_modalChart) return;
            var max = Math.max(0, _modalAllLabels.length - _PAN_WINDOW);
            _modalPanOffset = Math.max(0, Math.min(_modalPanOffset + delta, max));
            var endIdx = Math.min(_modalPanOffset + _PAN_WINDOW - 1, _modalAllLabels.length - 1);
            _modalChart.options.scales.x.min = _modalAllLabels[_modalPanOffset];
            _modalChart.options.scales.x.max = _modalAllLabels[endIdx];
            _modalChart.update();
        }

        document.addEventListener('DOMContentLoaded', function () {
            var modal = document.getElementById('chart-modal');
            if (!modal) return;

            document.getElementById('chart-modal-close').addEventListener('click', closeChartModal);

            modal.addEventListener('click', function (e) {
                if (e.target === modal) closeChartModal();
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeChartModal();
            });

            var panLeft  = document.getElementById('chart-pan-left');
            var panRight = document.getElementById('chart-pan-right');
            if (panLeft)  panLeft.addEventListener('click',  function () { panModal(-_PAN_STEP); });
            if (panRight) panRight.addEventListener('click', function () { panModal(_PAN_STEP); });
        });

        window.openChartModal = openChartModal;
    }());
    </script>
</body>
</html>
