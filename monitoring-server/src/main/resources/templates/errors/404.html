<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body style="background-color:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="text-center">
        <p class="text-9xl font-bold" style="color:#3b82f6;">404</p>
        <h1 class="text-2xl font-semibold mt-4" style="color:#f1f5f9;">Page Not Found</h1>
        <p class="text-sm mt-2" style="color:#94a3b8;">The service or resource you requested does not exist.</p>
        <a th:href="@{/}" href="/"
           class="inline-block mt-6 px-6 py-2 rounded-lg text-sm font-medium transition-colors"
           style="background-color:#3b82f6;color:#fff;">← Back to Dashboard</a>
    </div>
</body>
</html>
