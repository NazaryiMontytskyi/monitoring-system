server:
  port: 8080

spring:
  application:
    name: monitoring-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/monitoring}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

monitoring:
  polling:
    enabled: true
    interval-seconds: 30
    timeout-seconds: 5
    connect-timeout-seconds: 3
  alert:
    enabled: true
    evaluation-window-minutes: 60
    notification-from: ${ALERT_FROM_EMAIL:monitoring@example.com}
    notification-to: ${ALERT_TO_EMAIL:admin@example.com}
  prediction:
    enabled: true
    min-r-squared: 0.3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.nmontytskyi.monitoring: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
