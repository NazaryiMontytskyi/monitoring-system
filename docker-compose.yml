networks:
  monitoring-network:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - monitoring-network

  monitoring-server:
    build:
      context: .
      dockerfile: monitoring-server/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/monitoring
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      ALERT_FROM_EMAIL: monitoring@example.com
      ALERT_TO_EMAIL: admin@example.com
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 5

  demo-inventory-service:
    build:
      context: .
      dockerfile: demo/Dockerfile
      args:
        SERVICE_MODULE: demo-inventory-service
    ports:
      - "8081:8081"
    depends_on:
      monitoring-server:
        condition: service_healthy
    environment:
      MONITORING_SERVER_URL: http://monitoring-server:8080
      SERVICE_BASE_URL: http://demo-inventory-service:8081
      SERVICE_ACTUATOR_URL: http://demo-inventory-service:8081/actuator
    networks:
      - monitoring-network

  demo-order-service:
    build:
      context: .
      dockerfile: demo/Dockerfile
      args:
        SERVICE_MODULE: demo-order-service
    ports:
      - "8082:8082"
    depends_on:
      monitoring-server:
        condition: service_healthy
    environment:
      MONITORING_SERVER_URL: http://monitoring-server:8080
      SERVICE_BASE_URL: http://demo-order-service:8082
      SERVICE_ACTUATOR_URL: http://demo-order-service:8082/actuator
    networks:
      - monitoring-network

  demo-payment-service:
    build:
      context: .
      dockerfile: demo/Dockerfile
      args:
        SERVICE_MODULE: demo-payment-service
    ports:
      - "8083:8083"
    depends_on:
      monitoring-server:
        condition: service_healthy
    environment:
      MONITORING_SERVER_URL: http://monitoring-server:8080
      SERVICE_BASE_URL: http://demo-payment-service:8083
      SERVICE_ACTUATOR_URL: http://demo-payment-service:8083/actuator
    networks:
      - monitoring-network
